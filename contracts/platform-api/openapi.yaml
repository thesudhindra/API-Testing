openapi: 3.1.0
info:
  title: API Testing Playground — Platform API
  version: 0.1.0
  description: |
    Phase 1 foundation contract. Authoritative runtime spec is generated at
    `/v3/api-docs` when platform-api is running.
servers:
  - url: http://localhost:8080
paths:
  /health:
    get:
      summary: Application health
      tags: [Platform]
      responses:
        '200':
          description: Service healthy
        '503':
          description: Dependency unhealthy
  /version:
    get:
      summary: Application version
      tags: [Platform]
  /v1/demo/validate:
    post:
      summary: Validation teaching endpoint
      tags: [Demo]
      security:
        - basicAuth: []
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
