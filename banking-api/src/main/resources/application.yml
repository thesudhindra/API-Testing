spring:
  application:
    name: banking-api
  datasource:
    url: ${PLAYGROUND_DB_URL:jdbc:postgresql://localhost:5432/playground}
    username: ${PLAYGROUND_DB_USER:playground}
    password: ${PLAYGROUND_DB_PASSWORD:playground}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: banking
    open-in-view: false
  flyway:
    enabled: true
    schemas: banking
    default-schema: banking
    locations: classpath:db/migration

server:
  port: ${PLAYGROUND_BANKING_PORT:8081}
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info

playground:
  jwt:
    secret: ${PLAYGROUND_JWT_SECRET:playground-dev-secret-change-in-production-min-32-chars}
    issuer: playground-banking
    ttl-seconds: 3600

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    root: INFO
    com.playground: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} %-5level [%thread] correlationId=%X{correlationId} %logger{36} - %msg%n"
